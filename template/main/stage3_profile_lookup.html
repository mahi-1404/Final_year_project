<!DOCTYPE html>
<html>
<head>
    <title>CTF - Stage 3: Identity Drift</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ctf.css') }}">
</head>
<body>
    <div class="container">
        <div class="ctf-card">
            <h2>Stage 3: The XML Gateway</h2>
            <p>"The system accepts XML data for profile lookup. It trusts external entities... perhaps too much. Can you make it read things it shouldn't?"</p>
            <h3>Hint: XXE (XML External Entity Injection)</h3>
            <form action="/profile" method="post" class="ctf-form">
                <div class="form-group">
                    <label for="xml_data">XML Profile Data</label>
                    <textarea id="xml_data" name="xml_data" rows="6" placeholder="Enter XML data" required></textarea>
                </div>
                <button type="submit" class="ctf-button">Submit XML</button>
            </form>
            <p><a href="/stage2" class="back-link">Back to Stage 2</a></p>
        </div>
    </div>
</body>
</html>
