<!DOCTYPE html>
<html>
<head>
    <title>CTF - Stage 5: System Override</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ctf.css') }}">
</head>
<body>
    <div class="container">
        <div class="ctf-card">
            <h2>Stage 5: The Request Forwarder</h2>
            <p>"You've reached the system diagnostics panel. It can fetch resources from any URL you provide. But what if you ask it to fetch from itself... or from hidden internal services?"</p>
            <h3>Hint: SSRF (Server-Side Request Forgery)</h3>
            <form action="/diagnose" method="post" class="ctf-form">
                <div class="form-group">
                    <label for="target_url">Target URL</label>
                    <input type="text" id="target_url" name="target_url" placeholder="Enter URL to fetch (e.g., http://example.com)" required>
                </div>
                <button type="submit" class="ctf-button">Fetch Resource</button>
            </form>
            <p><a href="/stage4" class="back-link">Back to Stage 4</a></p>
        </div>
    </div>
</body>
</html>
