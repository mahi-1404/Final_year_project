<!DOCTYPE html>
<html>
<head>
    <title>Security Check - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .detection-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .detection-result.safe {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(34, 139, 34, 0.2));
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .detection-result.malicious {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(139, 0, 0, 0.2));
            border: 2px solid #ff0000;
            color: #ff0000;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00ff00;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-group {
            position: relative;
        }

        .input-status {
            position: absolute;
            right: 10px;
            top: 35px;
            font-size: 20px;
            display: none;
        }

        input:valid {
            border-color: #00ff00 !important;
        }

        .submit-btn {
            position: relative;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="main-section">
        <div class="right-panel">
            <div class="login-card">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                        <span class="input-status" id="usernameStatus"></span>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                        <span class="input-status" id="passwordStatus"></span>
                    </div>
                    <div id="detectionResult" class="detection-result"></div>
                    <button type="submit" class="primary-button submit-btn" id="submitBtn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const detectionResult = document.getElementById('detectionResult');
        const usernameStatus = document.getElementById('usernameStatus');
        const passwordStatus = document.getElementById('passwordStatus');
        const submitBtn = document.getElementById('submitBtn');

        // Check input with ML detection
        async function checkInput(inputValue) {
            try {
                const response = await fetch('/ml_detect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ input: inputValue })
                });

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Detection error:', error);
                return null;
            }
        }

        // Form submission - Silent redirect
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                return;
            }

            // Show loading state silently
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            detectionResult.innerHTML = '<span class="loading"></span>';
            detectionResult.style.display = 'block';

            try {
                // Check both inputs silently
                const usernameResult = await checkInput(username);
                const passwordResult = await checkInput(password);

                // Determine result
                const isSafe = usernameResult && passwordResult && 
                              !usernameResult.is_malicious && !passwordResult.is_malicious;

                // Silent redirect - no messages shown
                if (isSafe) {
                    // Safe - go to safe page
                    fetch('/log_redirect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target: 'safe', verdict: 'green', reason: 'clean_input', path: '/' })
                    });
                    setTimeout(() => {
                        window.location.href = '/safe';
                    }, 1000);
                } else {
                    // Attack - go to honeypot
                    const reason = (usernameResult && usernameResult.is_malicious)
                        ? (usernameResult.attack_type || 'malicious')
                        : (passwordResult && passwordResult.attack_type || 'malicious');
                    fetch('/log_redirect', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target: 'honeypot', verdict: 'red', reason: reason, path: '/' })
                    });
                    setTimeout(() => {
                        window.location.href = '/honeypot';
                    }, 1000);
                }
            } catch (error) {
                console.error('Error during detection:', error);
                // On error, redirect to safe page
                setTimeout(() => {
                    window.location.href = '/safe';
                }, 1000);
            }
        });

        // Add keydown listener for form
        loginForm.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && loginForm.checkValidity()) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
